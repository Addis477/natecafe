<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate Café - Admin Dashboard ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0A1F12 0%, #0F2D1A 100%); color: #E8F5EC; min-height: 100vh; }
        
        /* Glassmorphism Container */
        .glass-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { text-align: center; padding: 30px 0 20px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; background: linear-gradient(135deg, #C9A96E, #E8D5A3); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header p { color: #8FA89A; margin-top: 8px; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(15,45,26,0.7); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; text-align: center; border: 1px solid rgba(201,169,110,0.2); transition: 0.3s; }
        .stat-card:hover { border-color: #C9A96E; transform: translateY(-5px); }
        .stat-card i { font-size: 2rem; color: #C9A96E; margin-bottom: 10px; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #C9A96E; }
        .stat-label { color: #8FA89A; font-size: 0.8rem; margin-top: 5px; }
        
        /* Toolbar */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .btn { padding: 12px 24px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(135deg, #2D8A4E, #1B6B34); color: white; box-shadow: 0 4px 15px rgba(45,138,78,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,138,78,0.4); }
        .btn-gold { background: linear-gradient(135deg, #C9A96E, #B8933F); color: #0A1F12; }
        .btn-gold:hover { transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid #C9A96E; color: #C9A96E; }
        .btn-outline:hover { background: #C9A96E; color: #0A1F12; }
        
        /* Search */
        .search-area { display: flex; gap: 12px; flex-wrap: wrap; }
        .search-area input, .search-area select { padding: 10px 18px; border-radius: 50px; border: 1px solid rgba(45,138,78,0.3); background: rgba(15,45,26,0.7); color: white; font-size: 0.9rem; }
        .search-area input:focus, .search-area select:focus { outline: none; border-color: #C9A96E; }
        .search-area input { width: 220px; }
        
        /* Menu Grid - Beautiful Cards */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 20px; }
        .menu-card { background: rgba(15,45,26,0.8); backdrop-filter: blur(10px); border-radius: 28px; overflow: hidden; border: 1px solid rgba(201,169,110,0.15); transition: 0.3s; }
        .menu-card:hover { transform: translateY(-8px); border-color: #C9A96E; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .card-image { position: relative; height: 200px; overflow: hidden; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .menu-card:hover .card-image img { transform: scale(1.05); }
        .card-badge { position: absolute; top: 12px; right: 12px; background: #C9A96E; color: #0A1F12; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; }
        .card-content { padding: 18px; }
        .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .card-header h3 { font-size: 1.2rem; font-family: 'Playfair Display', serif; color: white; }
        .price { color: #C9A96E; font-weight: bold; font-size: 1.1rem; }
        .category { display: inline-block; background: rgba(45,138,78,0.3); padding: 3px 10px; border-radius: 50px; font-size: 0.7rem; margin: 8px 0; }
        .description { color: #8FA89A; font-size: 0.85rem; line-height: 1.5; margin: 8px 0; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
        .tag { background: rgba(201,169,110,0.15); padding: 3px 10px; border-radius: 50px; font-size: 0.7rem; color: #E8D5A3; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; padding-top: 12px; border-top: 1px solid rgba(201,169,110,0.15); }
        .edit-btn, .delete-btn { flex: 1; padding: 8px; border-radius: 50px; border: none; cursor: pointer; font-weight: 500; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .edit-btn { background: rgba(201,169,110,0.15); color: #C9A96E; }
        .edit-btn:hover { background: #C9A96E; color: #0A1F12; }
        .delete-btn { background: rgba(139,0,0,0.2); color: #ff6b6b; }
        .delete-btn:hover { background: #8B0000; color: white; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #0F2D1A; border-radius: 32px; padding: 30px; width: 550px; max-width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid #C9A96E; }
        .modal-content h2 { color: #C9A96E; margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        .modal-content label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #B8D4C2; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(45,138,78,0.3); background: #0A2A16; color: white; }
        .image-preview { margin-top: 10px; max-width: 100%; border-radius: 12px; display: none; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        
        /* Token Modal */
        .token-modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .token-card { background: #0F2D1A; border-radius: 32px; padding: 40px; width: 450px; max-width: 90%; text-align: center; border: 2px solid #C9A96E; }
        .token-card h2 { color: #C9A96E; margin-bottom: 15px; }
        .token-card input { width: 100%; padding: 14px; border-radius: 50px; border: 1px solid #C9A96E; background: #0A2A16; color: white; margin: 20px 0; font-size: 1rem; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #2D8A4E; color: white; padding: 12px 24px; border-radius: 50px; display: none; z-index: 1500; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; }
            .search-area { width: 100%; flex-direction: column; }
            .search-area input, .search-area select { width: 100%; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <h1><i class="fas fa-crown"></i> Nate Café Admin Dashboard</h1>
        <p>Manage your menu with elegance and ease</p>
    </div>
    
    <div id="statsContainer" class="stats-grid">
        <div class="stat-card"><i class="fas fa-utensils"></i><div class="stat-number" id="totalItems">0</div><div class="stat-label">Total Dishes</div></div>
        <div class="stat-card"><i class="fas fa-tags"></i><div class="stat-number" id="totalCategories">0</div><div class="stat-label">Categories</div></div>
        <div class="stat-card"><i class="fas fa-coins"></i><div class="stat-number" id="avgPrice">0</div><div class="stat-label">Avg Price (ETB)</div></div>
        <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-number" id="lastUpdate">-</div><div class="stat-label">Last Updated</div></div>
    </div>
    
    <div class="toolbar">
        <div>
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add New Dish</button>
            <button class="btn btn-gold" onclick="fetchMenu()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="🔍 Search dishes..." onkeyup="renderMenu()">
            <select id="categoryFilter" onchange="renderMenu()">
                <option value="all">All Categories</option>
                <option value="Ethiopian Specials">🇪🇹 Ethiopian Specials</option>
                <option value="Main Courses">🍽️ Main Courses</option>
                <option value="Appetizers">🥗 Appetizers</option>
                <option value="Coffee & Drinks">☕ Coffee & Drinks</option>
                <option value="Mocktails">🍹 Mocktails</option>
                <option value="Desserts">🍰 Desserts</option>
            </select>
        </div>
    </div>
    
    <div id="menuContainer" class="menu-grid">
        <div style="text-align:center; padding:60px;"><i class="fas fa-spinner fa-spin"></i> Loading your lovely menu...</div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div id="itemModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">✨ Add New Dish</h2>
        <input type="hidden" id="itemIndex" value="-1">
        <label>🍽️ Dish Name</label>
        <input type="text" id="itemName" placeholder="e.g., Ethiopian Special Tibs">
        <label>📂 Category</label>
        <select id="itemCategory">
            <option value="Ethiopian Specials">🇪🇹 Ethiopian Specials</option>
            <option value="Main Courses">🍽️ Main Courses</option>
            <option value="Appetizers">🥗 Appetizers</option>
            <option value="Coffee & Drinks">☕ Coffee & Drinks</option>
            <option value="Mocktails">🍹 Mocktails</option>
            <option value="Desserts">🍰 Desserts</option>
        </select>
        <label>💰 Price (ETB)</label>
        <input type="number" id="itemPrice" placeholder="350">
        <label>📝 Description</label>
        <textarea id="itemDescription" rows="3" placeholder="Describe your delicious dish..."></textarea>
        <label>🏷️ Tags (comma separated)</label>
        <input type="text" id="itemTags" placeholder="Spicy, Popular, Traditional">
        <label>⭐ Badge (optional)</label>
        <input type="text" id="itemBadge" placeholder="Chef's Special, Best Seller, New">
        <label>🖼️ Dish Photo</label>
        <input type="file" id="imageFile" accept="image/*" onchange="uploadImage()">
        <img id="imagePreview" class="image-preview">
        <div class="modal-buttons">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveItem()">💾 Save Dish</button>
        </div>
    </div>
</div>

<!-- Token Modal (First Time Only) -->
<div id="tokenModal" class="token-modal">
    <div class="token-card">
        <i class="fas fa-key" style="font-size: 3rem; color: #C9A96E;"></i>
        <h2>Welcome to Your Dashboard</h2>
        <p style="color: #8FA89A;">Enter your GitHub token once to start managing your menu</p>
        <input type="password" id="tokenInput" placeholder="Enter your GitHub token (ghp_...)">
        <button class="btn btn-primary" onclick="saveToken()" style="width: 100%;">✨ Access Dashboard ✨</button>
        <p style="font-size: 0.7rem; margin-top: 15px;"><a href="https://github.com/settings/tokens" target="_blank" style="color: #C9A96E;">Get your token here</a> (need 'repo' access)</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // Config
    let menuData = { menuItems: [] };
    let githubToken = localStorage.getItem('nate_token');
    const GITHUB_API = 'https://api.github.com/repos/Addis477/natecafe/contents/data/menu.json';
    const CLOUD_NAME = 'dagujducp';
    const UPLOAD_PRESET = 'ml_default';
    
    let pendingImageUrl = null;
    
    // Check token
    if (githubToken) {
        document.getElementById('tokenModal').style.display = 'none';
        fetchMenu();
    } else {
        document.getElementById('tokenModal').style.display = 'flex';
    }
    
    function saveToken() {
        const token = document.getElementById('tokenInput').value.trim();
        if (token && token.length > 10) {
            localStorage.setItem('nate_token', token);
            githubToken = token;
            document.getElementById('tokenModal').style.display = 'none';
            fetchMenu();
            showToast('Token saved! Loading your menu...', '#2D8A4E');
        } else {
            showToast('Please enter a valid token', '#8B0000');
        }
    }
    
    async function fetchMenu() {
        try {
            const response = await fetch(GITHUB_API, { headers: { 'Authorization': `token ${githubToken}` } });
            if (!response.ok) throw new Error('Menu not found');
            const data = await response.json();
            const decoded = atob(data.content);
            menuData = JSON.parse(decoded);
            menuData.sha = data.sha;
            renderMenu();
            updateStats();
            showToast(`🎉 Loaded ${menuData.menuItems.length} delicious dishes!`, '#2D8A4E');
        } catch (error) {
            showToast('Error loading menu', '#8B0000');
            document.getElementById('menuContainer').innerHTML = '<div style="text-align:center;padding:60px;">⚠️ Unable to load menu. Make sure data/menu.json exists.</div>';
        }
    }
    
    function renderMenu() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categoryFilter').value;
        
        let filtered = [...menuData.menuItems];
        if (search) filtered = filtered.filter(i => i.name.toLowerCase().includes(search));
        if (category !== 'all') filtered = filtered.filter(i => i.category === category);
        
        const container = document.getElementById('menuContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px;"><i class="fas fa-heart" style="font-size:3rem; color:#C9A96E;"></i><p style="margin-top:15px;">No dishes found. Add your first one!</p></div>';
            return;
        }
        
        container.innerHTML = filtered.map((item, idx) => {
            const originalIdx = menuData.menuItems.findIndex(i => i.name === item.name && i.price === item.price);
            return `
            <div class="menu-card">
                <div class="card-image">
                    <img src="${item.image || 'https://placehold.co/600x450/2D8A4E/C9A96E?text=Nate+Dish'}" alt="${item.name}" onerror="this.src='https://placehold.co/600x450/2D8A4E/C9A96E?text=Nate+Dish'">
                    ${item.badge ? `<div class="card-badge">${escapeHtml(item.badge)}</div>` : ''}
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <h3>${escapeHtml(item.name)}</h3>
                        <span class="price">${item.price} ETB</span>
                    </div>
                    <span class="category"><i class="fas fa-folder-open"></i> ${escapeHtml(item.category)}</span>
                    <p class="description">${escapeHtml(item.description?.substring(0, 100) || '')}${item.description?.length > 100 ? '...' : ''}</p>
                    <div class="tags">${(item.tags || []).map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>
                    <div class="card-actions">
                        <button class="edit-btn" onclick="editItem(${originalIdx})"><i class="fas fa-pencil-alt"></i> Edit</button>
                        <button class="delete-btn" onclick="deleteItem(${originalIdx})"><i class="fas fa-trash-alt"></i> Delete</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }
    
    function updateStats() {
        document.getElementById('totalItems').textContent = menuData.menuItems.length;
        const cats = [...new Set(menuData.menuItems.map(i => i.category))];
        document.getElementById('totalCategories').textContent = cats.length;
        const avg = menuData.menuItems.reduce((s,i) => s + i.price, 0) / menuData.menuItems.length;
        document.getElementById('avgPrice').textContent = Math.round(avg) || 0;
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    }
    
    function openAddModal() {
        pendingImageUrl = null;
        document.getElementById('modalTitle').innerHTML = '✨ Add New Dish';
        document.getElementById('itemIndex').value = '-1';
        document.getElementById('itemName').value = '';
        document.getElementById('itemCategory').value = 'Main Courses';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemDescription').value = '';
        document.getElementById('itemTags').value = '';
        document.getElementById('itemBadge').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('imageFile').value = '';
        document.getElementById('itemModal').style.display = 'flex';
    }
    
    function editItem(index) {
        const item = menuData.menuItems[index];
        pendingImageUrl = item.image || null;
        document.getElementById('modalTitle').innerHTML = '✏️ Edit Dish';
        document.getElementById('itemIndex').value = index;
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemCategory').value = item.category;
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('itemDescription').value = item.description || '';
        document.getElementById('itemTags').value = (item.tags || []).join(', ');
        document.getElementById('itemBadge').value = item.badge || '';
        if (item.image && !item.image.includes('placehold.co')) {
            document.getElementById('imagePreview').src = item.image;
            document.getElementById('imagePreview').style.display = 'block';
        } else {
            document.getElementById('imagePreview').style.display = 'none';
        }
        document.getElementById('imageFile').value = '';
        document.getElementById('itemModal').style.display = 'flex';
    }
    
    async function uploadImage() {
        const file = document.getElementById('imageFile').files[0];
        if (!file) return;
        showToast('Uploading to Cloudinary...', '#C9A96E');
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);
        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if (data.secure_url) {
                pendingImageUrl = data.secure_url;
                document.getElementById('imagePreview').src = data.secure_url;
                document.getElementById('imagePreview').style.display = 'block';
                showToast('Image uploaded!', '#2D8A4E');
            }
        } catch(e) { showToast('Upload failed', '#8B0000'); }
    }
    
    async function saveItem() {
        const name = document.getElementById('itemName').value.trim();
        const category = document.getElementById('itemCategory').value;
        const price = parseInt(document.getElementById('itemPrice').value);
        const description = document.getElementById('itemDescription').value;
        const tagsRaw = document.getElementById('itemTags').value;
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];
        const badge = document.getElementById('itemBadge').value;
        const index = parseInt(document.getElementById('itemIndex').value);
        
        if (!name || !price) { showToast('Name and price required', '#8B0000'); return; }
        
        const newItem = { name, category, price, description, tags, badge, image: pendingImageUrl || 'https://placehold.co/600x450/2D8A4E/C9A96E?text=Nate+Dish' };
        
        if (index === -1) menuData.menuItems.push(newItem);
        else menuData.menuItems[index] = newItem;
        
        await saveToGitHub();
        closeModal();
        renderMenu();
        updateStats();
        showToast('✅ Menu saved! Website updates in 30 sec', '#2D8A4E');
    }
    
    async function deleteItem(index) {
        if (confirm(`Delete "${menuData.menuItems[index].name}"?`)) {
            menuData.menuItems.splice(index, 1);
            await saveToGitHub();
            renderMenu();
            updateStats();
            showToast('Item deleted', '#2D8A4E');
        }
    }
    
    async function saveToGitHub() {
        const updated = JSON.stringify(menuData, null, 2);
        const encoded = btoa(unescape(encodeURIComponent(updated)));
        const res = await fetch(GITHUB_API, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `token ${githubToken}` },
            body: JSON.stringify({ message: `Menu update ${new Date().toLocaleString()}`, content: encoded, sha: menuData.sha })
        });
        if (!res.ok) throw new Error('Save failed');
        const result = await res.json();
        menuData.sha = result.content.sha;
    }
    
    function closeModal() { document.getElementById('itemModal').style.display = 'none'; }
    function showToast(msg, color) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = color;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    function escapeHtml(t) { if (!t) return ''; return t.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    window.onclick = e => { if (e.target === document.getElementById('itemModal')) closeModal(); }
</script>
</body>
</html>
