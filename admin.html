<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate Café - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A1F12; color: #E8F5EC; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        h1 { color: #C9A96E; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        .subtitle { color: #8FA89A; margin-bottom: 30px; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #0F2D1A; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid rgba(45,138,78,0.3); }
        .stat-number { font-size: 2rem; font-weight: bold; color: #C9A96E; }
        .stat-label { color: #8FA89A; font-size: 0.85rem; margin-top: 5px; }
        
        /* Toolbar */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .btn { padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #2D8A4E; color: white; }
        .btn-primary:hover { background: #1B6B34; transform: translateY(-2px); }
        .btn-gold { background: #C9A96E; color: #0A1F12; }
        .btn-gold:hover { background: #B8933F; transform: translateY(-2px); }
        .btn-danger { background: #8B0000; color: white; }
        .btn-danger:hover { background: #a00000; }
        .btn-outline { background: transparent; border: 2px solid #C9A96E; color: #C9A96E; }
        
        /* Search */
        .search-box { display: flex; gap: 10px; }
        .search-box input { padding: 10px 16px; border-radius: 50px; border: 1px solid rgba(45,138,78,0.3); background: #0F2D1A; color: white; width: 250px; }
        .search-box input:focus { outline: none; border-color: #C9A96E; }
        
        /* Menu Table */
        .menu-table { background: #0F2D1A; border-radius: 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(45,138,78,0.2); }
        th { color: #C9A96E; font-weight: 600; }
        .menu-image-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .actions { display: flex; gap: 8px; }
        .edit-btn, .delete-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 5px; }
        .edit-btn { color: #C9A96E; }
        .delete-btn { color: #ff6b6b; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #0F2D1A; padding: 30px; border-radius: 24px; width: 500px; max-width: 90%; border: 1px solid #C9A96E; }
        .modal-content h2 { color: #C9A96E; margin-bottom: 20px; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(45,138,78,0.3); background: #0A2A16; color: white; }
        .modal-content input:focus, .modal-content select:focus, .modal-content textarea:focus { outline: none; border-color: #C9A96E; }
        .image-preview { margin: 10px 0; max-width: 100%; border-radius: 12px; display: none; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        
        /* Status */
        .status { padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .status.success { background: rgba(45,138,78,0.2); color: #2D8A4E; display: block; }
        .status.error { background: rgba(255,0,0,0.1); color: #ff6b6b; display: block; }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; }
            .search-box { width: 100%; }
            .search-box input { width: 100%; }
            th, td { padding: 10px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-utensils"></i> Nate Café - Admin Dashboard</h1>
        <p class="subtitle">Manage your menu items, prices, and images</p>
        
        <div id="status" class="status"></div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalItems">0</div><div class="stat-label">Total Items</div></div>
            <div class="stat-card"><div class="stat-number" id="totalCategories">0</div><div class="stat-label">Categories</div></div>
            <div class="stat-card"><div class="stat-number" id="avgPrice">0</div><div class="stat-label">Avg Price (ETB)</div></div>
            <div class="stat-card"><div class="stat-number" id="lastUpdate">-</div><div class="stat-label">Last Update</div></div>
        </div>
        
        <div class="toolbar">
            <div>
                <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add New Item</button>
                <button class="btn btn-gold" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search dishes..." onkeyup="filterMenu()">
                <select id="categoryFilter" onchange="filterMenu()">
                    <option value="all">All Categories</option>
                    <option value="Ethiopian Specials">🇪🇹 Ethiopian Specials</option>
                    <option value="Main Courses">🍽️ Main Courses</option>
                    <option value="Appetizers">🥗 Appetizers</option>
                    <option value="Coffee & Drinks">☕ Coffee & Drinks</option>
                    <option value="Mocktails">🍹 Mocktails</option>
                    <option value="Desserts">🍰 Desserts</option>
                </select>
            </div>
        </div>
        
        <div id="menuContainer" class="menu-table">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading menu...</div>
        </div>
    </div>
    
    <!-- Add/Edit Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Menu Item</h2>
            <input type="hidden" id="itemIndex" value="-1">
            <input type="text" id="itemName" placeholder="Dish Name" required>
            <select id="itemCategory">
                <option value="Ethiopian Specials">🇪🇹 Ethiopian Specials</option>
                <option value="Main Courses">🍽️ Main Courses</option>
                <option value="Appetizers">🥗 Appetizers</option>
                <option value="Coffee & Drinks">☕ Coffee & Drinks</option>
                <option value="Mocktails">🍹 Mocktails</option>
                <option value="Desserts">🍰 Desserts</option>
            </select>
            <input type="number" id="itemPrice" placeholder="Price (ETB)" required>
            <textarea id="itemDescription" rows="3" placeholder="Description"></textarea>
            <input type="text" id="itemTags" placeholder="Tags (comma separated) e.g., Spicy, Popular">
            <input type="text" id="itemBadge" placeholder="Badge (e.g., Chef's Special, New, Best Seller)">
            <div id="imageUploadArea">
                <input type="file" id="imageFile" accept="image/*" onchange="uploadToCloudinary()">
                <p style="font-size: 0.8rem; color: #8FA89A; margin-top: 5px;">Upload new image (will replace current)</p>
            </div>
            <img id="imagePreview" class="image-preview">
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
            </div>
        </div>
    </div>
    
    <script>
        let menuData = { menuItems: [] };
        let originalJsonContent = '';
        
        // GitHub config
        const GITHUB_API = 'https://api.github.com/repos/Addis477/natecafe/contents/data/menu.json';
        const CLOUD_NAME = 'dagujducp';
        const UPLOAD_PRESET = 'ml_default';
        
        async function fetchMenu() {
            try {
                showStatus('Loading menu from GitHub...', 'info');
                const response = await fetch(GITHUB_API);
                if (!response.ok) throw new Error('Failed to fetch menu.json');
                const data = await response.json();
                originalJsonContent = data.content;
                const decodedContent = atob(data.content);
                menuData = JSON.parse(decodedContent);
                displayMenu();
                updateStats();
                showStatus('Menu loaded successfully!', 'success');
                setTimeout(() => hideStatus(), 2000);
            } catch (error) {
                console.error('Error:', error);
                showStatus('Error loading menu: ' + error.message, 'error');
                document.getElementById('menuContainer').innerHTML = '<div style="padding:40px;text-align:center;">Error loading menu. Make sure menu.json exists.</div>';
            }
        }
        
        function displayMenu() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            
            let filtered = [...menuData.menuItems];
            if (searchTerm) {
                filtered = filtered.filter(item => item.name.toLowerCase().includes(searchTerm));
            }
            if (categoryFilter !== 'all') {
                filtered = filtered.filter(item => item.category === categoryFilter);
            }
            
            const container = document.getElementById('menuContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding:40px;text-align:center;">No menu items found</div>';
                return;
            }
            
            container.innerHTML = `
                <table>
                    <thead>
                        <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Badge</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        ${filtered.map((item, idx) => {
                            const originalIndex = menuData.menuItems.findIndex(i => i.name === item.name && i.price === item.price);
                            return `
                            <tr>
                                <td><img src="${item.image || 'https://placehold.co/50x50/2D8A4E/C9A96E?text=No+Img'}" class="menu-image-preview" onerror="this.src='https://placehold.co/50x50/2D8A4E/C9A96E?text=No+Img'"></td>
                                <td><strong>${escapeHtml(item.name)}</strong><br><small>${escapeHtml(item.description?.substring(0, 50) || '')}...</small></td>
                                <td>${escapeHtml(item.category)}</td>
                                <td>${item.price} ETB</td>
                                <td>${item.badge ? `<span style="background:#C9A96E; color:#0A1F12; padding:2px 8px; border-radius:20px; font-size:0.7rem;">${escapeHtml(item.badge)}</span>` : '-'}</td>
                                <td class="actions">
                                    <button class="edit-btn" onclick="editItem(${originalIndex})" title="Edit"><i class="fas fa-edit"></i></button>
                                    <button class="delete-btn" onclick="deleteItem(${originalIndex})" title="Delete"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function filterMenu() { displayMenu(); }
        
        function updateStats() {
            document.getElementById('totalItems').textContent = menuData.menuItems.length;
            const categories = [...new Set(menuData.menuItems.map(i => i.category))];
            document.getElementById('totalCategories').textContent = categories.length;
            const avg = menuData.menuItems.reduce((sum, i) => sum + i.price, 0) / menuData.menuItems.length;
            document.getElementById('avgPrice').textContent = Math.round(avg);
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        let currentEditIndex = -1;
        let pendingImageUrl = null;
        
        function openAddModal() {
            currentEditIndex = -1;
            pendingImageUrl = null;
            document.getElementById('modalTitle').textContent = 'Add Menu Item';
            document.getElementById('itemIndex').value = '-1';
            document.getElementById('itemName').value = '';
            document.getElementById('itemCategory').value = 'Main Courses';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemDescription').value = '';
            document.getElementById('itemTags').value = '';
            document.getElementById('itemBadge').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageFile').value = '';
            document.getElementById('modal').style.display = 'flex';
        }
        
        function editItem(index) {
            currentEditIndex = index;
            const item = menuData.menuItems[index];
            pendingImageUrl = item.image || null;
            document.getElementById('modalTitle').textContent = 'Edit Menu Item';
            document.getElementById('itemIndex').value = index;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemCategory').value = item.category;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemDescription').value = item.description || '';
            document.getElementById('itemTags').value = (item.tags || []).join(', ');
            document.getElementById('itemBadge').value = item.badge || '';
            if (item.image) {
                document.getElementById('imagePreview').src = item.image;
                document.getElementById('imagePreview').style.display = 'block';
            } else {
                document.getElementById('imagePreview').style.display = 'none';
            }
            document.getElementById('imageFile').value = '';
            document.getElementById('modal').style.display = 'flex';
        }
        
        async function uploadToCloudinary() {
            const file = document.getElementById('imageFile').files[0];
            if (!file) return;
            
            showStatus('Uploading image to Cloudinary...', 'info');
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.secure_url) {
                    pendingImageUrl = data.secure_url;
                    document.getElementById('imagePreview').src = data.secure_url;
                    document.getElementById('imagePreview').style.display = 'block';
                    showStatus('Image uploaded successfully!', 'success');
                    setTimeout(() => hideStatus(), 2000);
                }
            } catch (error) {
                console.error('Upload error:', error);
                showStatus('Image upload failed', 'error');
            }
        }
        
        async function saveItem() {
            const name = document.getElementById('itemName').value.trim();
            const category = document.getElementById('itemCategory').value;
            const price = parseInt(document.getElementById('itemPrice').value);
            const description = document.getElementById('itemDescription').value;
            const tagsRaw = document.getElementById('itemTags').value;
            const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()) : [];
            const badge = document.getElementById('itemBadge').value;
            const index = parseInt(document.getElementById('itemIndex').value);
            
            if (!name || !price) {
                showStatus('Please fill in name and price', 'error');
                return;
            }
            
            const newItem = {
                name,
                category,
                price,
                description,
                tags,
                badge: badge || '',
                image: pendingImageUrl || 'https://placehold.co/600x450/2D8A4E/C9A96E?text=No+Image'
            };
            
            if (index === -1) {
                menuData.menuItems.push(newItem);
            } else {
                menuData.menuItems[index] = newItem;
            }
            
            await saveToGitHub();
            closeModal();
            displayMenu();
            updateStats();
            showStatus('Menu saved successfully!', 'success');
            setTimeout(() => hideStatus(), 2000);
        }
        
        async function deleteItem(index) {
            if (confirm('Are you sure you want to delete this item?')) {
                menuData.menuItems.splice(index, 1);
                await saveToGitHub();
                displayMenu();
                updateStats();
                showStatus('Item deleted successfully!', 'success');
                setTimeout(() => hideStatus(), 2000);
            }
        }
        
        async function saveToGitHub() {
            showStatus('Saving to GitHub...', 'info');
            const updatedJson = JSON.stringify(menuData, null, 2);
            const encodedContent = btoa(unescape(encodeURIComponent(updatedJson)));
            
            // Get current file SHA
            const fileResponse = await fetch(GITHUB_API);
            const fileData = await fileResponse.json();
            
            const payload = {
                message: `Update menu - ${new Date().toLocaleString()}`,
                content: encodedContent,
                sha: fileData.sha
            };
            
            const response = await fetch(GITHUB_API, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `token ${prompt('Enter your GitHub Personal Access Token (needed to save changes):')}`
                },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
                throw new Error('Failed to save to GitHub');
            }
            
            showStatus('Saved to GitHub! Website will update in 30 seconds.', 'success');
            setTimeout(() => hideStatus(), 3000);
        }
        
        function refreshData() { fetchMenu(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
        }
        function hideStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'none';
            setTimeout(() => { statusDiv.style.display = ''; }, 100);
        }
        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        // Close modal on outside click
        window.onclick = function(event) { if (event.target === document.getElementById('modal')) closeModal(); }
        
        fetchMenu();
    </script>
</body>
</html>
